controllers:
    resource:
        path: '%kernel.project_dir%/src/Controller/'
        namespace: App\Controller
    type: attribute

nowo_icon_selector:
    resource: '@NowoIconSelectorBundle/Resources/config/routes.yaml'

# Dev-only: Web Profiler + Nowo Twig Inspector (loaded when APP_ENV=dev)
when@dev:
    _dev_routes:
        resource: ../config/routes/dev/
        type: directory
